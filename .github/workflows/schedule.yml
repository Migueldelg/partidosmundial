match = None
aviso_24h = False

for m,d,h,mi,local,visit,fl,fv,hora_es,fecha,grupo,canal,espana in PARTIDOS:
    match_dt = datetime(now.year, m, d, h, mi, tzinfo=timezone.utc)
    delta = (match_dt - now).total_seconds() / 60  # minutos hasta el partido

    if 5 <= delta <= 65:  # ventana 30 minutos antes
        match = (local,visit,fl,fv,hora_es,fecha,grupo,canal,espana)
        aviso_24h = False
        break
    elif espana and 23*60+25 <= delta <= 24*60+35:  # ventana 24h antes (solo EspaГ±a)
        match = (local,visit,fl,fv,hora_es,fecha,grupo,canal,espana)
        aviso_24h = True
        break

if not match:
    print('No se encontrГі partido para este momento.')
    exit(0)

