            print('ok' if resp.get('ok') else resp)
            exit(0)

          # ── Resumen diario (9:00h española = 7:00 UTC) ──────────────────
          if now.hour == 8 and now.minute < 30:
            from datetime import timedelta
            hoy_cest = (now + timedelta(hours=2)).date()

            partidos_hoy = []
            for m,d,h,mi,local,visit,fl,fv,hora_es,fecha,grupo,canal_raw,espana in PARTIDOS:
              match_utc = datetime(now.year, m, d, h, mi, tzinfo=timezone.utc)
              match_cest_date = (match_utc + timedelta(hours=2)).date()
              if match_cest_date == hoy_cest:
                partidos_hoy.append((hora_es, fl, local, fv, visit, grupo, canal_raw, espana))

            if not partidos_hoy:
              print('Sin partidos hoy, no se envía resumen.')
              exit(0)

            fecha_str = now.strftime('%-d de') + {
              1:'enero',2:'febrero',3:'marzo',4:'abril',5:'mayo',6:'junio',
              7:'julio',8:'agosto',9:'septiembre',10:'octubre',11:'noviembre',12:'diciembre'
            }[now.month]

            lineas = []
            for hora_es, fl, local, fv, visit, grupo, canal_raw, espana in partidos_hoy:
              marca_esp = ' 🇪🇸' if espana else ''
              icono = CANAL_ICON.get(canal_raw, canal_raw)
              if visit == '—':
                lineas.append(f'⚽ <b>{hora_es}h</b> — {local}{marca_esp}  {icono}')
              else:
                lineas.append(f'⚽ <b>{hora_es}h</b> — {fl} {local} vs {fv} {visit}{marca_esp}  · Grupo {grupo} · {icono}')

            msg = (
              f'🏆 <b>Mundial 2026 — Partidos de hoy</b>\n'
              f'📅 {fecha_str}\n\n'
              + '\n'.join(lineas) +
              '\n\n<i>¡Que empiece el fútbol! ⚽</i>'
            )
            url  = f'https://api.telegram.org/bot{TOKEN}/sendMessage'
            data = urllib.parse.urlencode({'chat_id':CHAT_ID,'text':msg,'parse_mode':'HTML'}).encode()
            req  = urllib.request.Request(url,data=data,method='POST')
            with urllib.request.urlopen(req) as r:
              resp = json.loads(r.read())
            print('ok' if resp.get('ok') else resp)
            exit(0)
          # ────────────────────────────────────────────────────────────────

          match = None
          aviso_24h = False

          for m,d,h,mi,local,visit,fl,fv,hora_es,fecha,grupo,canal_raw,espana in PARTIDOS:
            match_dt = datetime(now.year, m, d, h, mi, tzinfo=timezone.utc)
            delta = (match_dt - now).total_seconds() / 60
            if 5 <= delta <= 65:
              match = (local,visit,fl,fv,hora_es,fecha,grupo,canal_raw,espana)
              aviso_24h = False
              break
            elif espana and 23*60+25 <= delta <= 24*60+35:
              match = (local,visit,fl,fv,hora_es,fecha,grupo,canal_raw,espana)
              aviso_24h = True
              break

          if not match:
            print('No se encontro partido para este momento.')
            exit(0)

          local,visit,fl,fv,hora_es,fecha,grupo,canal_raw,espana = match
          titulo = f'⚽ {local}' if visit == '—' else f'⚽ {fl} {local}  vs  {fv} {visit}'

          if aviso_24h:
            msg = (
              '🏆 <b>Mundial 2026</b>\n'
              '🇪🇸 <b>¡MAÑANA JUEGA ESPAÑA!</b>\n\n'
              f'{titulo}\n\n'
              f'🕐 Mañana a las <b>{hora_es}h</b> (hora española)\n'
              f'📺 {CANAL_ICON.get(canal_raw, canal_raw)}\n'
              f'📅 {fecha} · Grupo {grupo}\n\n'
              '<b>¡Prepárate! 🔥</b>'
            )
          else:
            espana_line = '\n🇪🇸 <b>¡PARTIDO DE ESPAÑA!</b>' if espana else ''
            msg = (
              f'🏆 <b>Mundial 2026</b>{espana_line}\n\n'
              f'{titulo}\n\n'
              f'🕐 Hoy a las <b>{hora_es}h</b> (hora española)\n'
              f'📺 {CANAL_ICON.get(canal_raw, canal_raw)}\n'
              f'📅 {fecha} · Grupo {grupo}\n\n'
              '<b>¡Empieza en 30 minutos! 🔥</b>'
            )

          url  = f'https://api.telegram.org/bot{TOKEN}/sendMessage'
          data = urllib.parse.urlencode({'chat_id':CHAT_ID,'text':msg,'parse_mode':'HTML'}).encode()
          req  = urllib.request.Request(url,data=data,method='POST')
          with urllib.request.urlopen(req) as r:
            resp = json.loads(r.read())
          print('ok' if resp.get('ok') else resp)
          EOF
