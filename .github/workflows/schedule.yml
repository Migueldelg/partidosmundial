          if now.hour == 8 and now.minute < 30:
            from datetime import timedelta
            hoy_cest = (now + timedelta(hours=2)).date()

            partidos_hoy = []
            for m,d,h,mi,local,visit,fl,fv,hora_es,fecha,grupo,canal,espana in PARTIDOS:
              match_utc = datetime(now.year, m, d, h, mi, tzinfo=timezone.utc)
              match_cest_date = (match_utc + timedelta(hours=2)).date()
              if match_cest_date == hoy_cest:
                partidos_hoy.append((hora_es, fl, local, fv, visit, grupo, canal, espana))

            if not partidos_hoy:
              print('Sin partidos hoy, no se envГӯa resumen.')
              exit(0)

